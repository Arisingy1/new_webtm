apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.deployments.talentmind.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.deployments.talentmind.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.deployments.talentmind.name }}
