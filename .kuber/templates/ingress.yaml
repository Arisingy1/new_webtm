apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-talentmind
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: {{ .Values.certIssuer }}
    {{- if .Values.basicAuth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.basicAuth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: 512m
    nginx.ingress.kubernetes.io/client-body-buffer-size: 4m
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-busy-buffer-size: "256k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  labels:
    app: {{ .Release.Name }}
spec:
  tls:
    - hosts:
        - {{ .Values.other.domain.talentmind }}
      secretName: talentmind-tls
    {{- range $i, $domain := .Values.other.additionalDomains }}
    - hosts:
        - {{ $domain }}
      secretName: talentmind-tls-{{ $i }}
    {{- end }}
  rules:
    - host: {{ .Values.other.domain.talentmind }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.deployments.talentmind.name }}
                port:
                  number: 80
    {{- range .Values.other.additionalDomains }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.deployments.talentmind.name }}
                port:
                  number: 80
    {{- end }}
